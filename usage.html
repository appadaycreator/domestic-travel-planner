    <meta name="theme-color" content="#1565c0"><title>使い方 - 国内旅行費用シミュレーター</title><style>body{font-family:'Noto Sans JP',sans-serif;background:#0d1b2a;color:#e0e0e0;max-width:800px;margin:0 auto;padding:2rem 1rem;line-height:1.8}h1{color:#7ecbff}h2{color:#7ecbff;margin:1.5rem 0 0.5rem}ol{padding-left:1.5rem}li{margin-bottom:0.5rem}a{color:#7ecbff}</style></head><body><h1>国内旅行費用シミュレーターの使い方</h1><h2>手順</h2><ol><li>目的地ボタンをクリックして選択（自動で交通費・宿泊費の目安がセットされます）</li><li>旅行人数・日数・シーズンを設定</li><li>費用詳細を確認・調整して「旅行費用を計算する」ボタンをクリック</li><li>合計費用と内訳が表示されます</li></ol><h2>都市別比較</h2><p>主要都市の2泊3日・2人旅の目安費用を棒グラフで比較できます。</p><p><a href="index.html">← トップへ戻る</a></p></body></html>
