<!-- End Google Tag Manager (noscript) --><h1>国内旅行費用シミュレーターの使い方</h1><h2>手順</h2><ol><li>目的地ボタンをクリックして選択（自動で交通費・宿泊費の目安がセットされます）</li><li>旅行人数・日数・シーズンを設定</li><li>費用詳細を確認・調整して「旅行費用を計算する」ボタンをクリック</li><li>合計費用と内訳が表示されます</li></ol><h2>都市別比較</h2><p>主要都市の2泊3日・2人旅の目安費用を棒グラフで比較できます。</p><p><a href="index.html">← トップへ戻る</a></p></body></html>
